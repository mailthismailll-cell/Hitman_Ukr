name: Build and Release Zip

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "innosetup.exe"
          Start-Process "innosetup.exe" "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Restore dependencies
        working-directory: tools/builder
        run: dotnet restore

      - name: Build the project
        working-directory: tools/builder
        run: dotnet build --configuration Release

      - name: Run the program to generate the zip
        run: .\tools\builder\ZipBuilder\bin\Release\net8.0\ZipBuilder.exe
        shell: powershell

      - name: Unzip file
        run: |
          Expand-Archive -Path "Hitman_Ukr.zip" -DestinationPath "output" -Force

      - name: Build installer (silent)
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & "$iscc" "${{ github.workspace }}\setup.iss"

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: "HitmanBM_Ukr2_2.exe"
          tag_name: "exe"  # Можна використовувати будь-який тег, якщо потрібно
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: "Hitman_Ukr.zip"
          tag_name: "zip"  # Можна використовувати будь-який тег, якщо потрібно
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
